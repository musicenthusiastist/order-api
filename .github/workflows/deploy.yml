name: Build and Deploy to GKE

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Basic syntax check
        run: node --check app.js

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-api:${IMAGE_TAG} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/order-api:${IMAGE_TAG} ${{ secrets.DOCKER_USERNAME }}/order-api:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-api:${IMAGE_TAG}
          docker push ${{ secrets.DOCKER_USERNAME }}/order-api:latest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --zone ${{ secrets.GKE_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml

      - name: Update image
        run: |
          kubectl set image deployment/order-api \
            order-api=${{ secrets.DOCKER_USERNAME }}/order-api:${IMAGE_TAG}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/order-api
          kubectl get pods
          kubectl get services